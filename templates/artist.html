<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/artist.css" />
    <title>artist page</title>
  </head>
  <body>
    <div class="page-wrap">
      <nav>
        <div class="navbar">
          <a class="logo">Groupie <span class="tracker">tracker</span></a>
          <ul class="links">
            <li><a href="#artists">Members</a></li>
            <li><a href="#tour">Map</a></li>
            <li><a href="#location">Tour dates</a></li>
          </ul>
          <a href="/artists" class="all">all artists</a>
        </div>
      </nav>
      <main class="hero">
        <div >
          <img src="{{.Image}}" class="hero-image"/>
          <h1>{{.Name}}</h1>
          <div class="details">
             <h3><span class="text">Est .</span>  {{.CreationDate}}</h3>
             <h3><span class="text">First album</span>  {{.FirstAlbum}}</h3>
             <h3><span class="text">member.</span>  {{len .Members}}</h3>
             <h3><span class="text">Location</span>  {{.CreationDate}}</h3>
          </div>
        </div>
        <div>
          <img src="/static/images/vinyl.svg" class="hero-svg"/>
        </div>
      </main>
      <article>

      </article>
    </div>
  </body>
</html>
